<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cosmic Explorers - Join the Fleet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/cosmic.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="images/cosmic-explorers-logo.png" alt="Logo" width="30" height="30" class="me-2">
        Cosmic Explorers
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="challenges.html">Challenges</a></li>
          <li class="nav-item"><a class="nav-link" href="planets.html">Planets</a></li>
          <li class="nav-item"><a class="nav-link" href="leaderboard.html">Leaderboard</a></li>
        </ul>

        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a id="loginButton" href="login.html" class="nav-link">Login</a></li>
          <li class="nav-item"><a id="registerButton" href="register.html" class="nav-link active">Register</a></li>
          <li class="nav-item"><a id="profileButton" href="profile.html" class="nav-link d-none">Profile</a></li>
          <li class="nav-item"><a id="logoutButton" href="#" class="nav-link d-none">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card shadow-lg p-4 text-center">
            <h2 class="fw-bold mb-2">Recruitment Bay</h2>
            <p class="auth-subtitle small mb-4">Create your Explorer identity.</p>

            <form id="registerForm">
              <div class="mb-3 text-start">
                <label class="form-label small">Callsign</label>
                <input type="text" id="username" class="form-control bg-dark text-white border-secondary"
                       placeholder="Choose a username" required>
              </div>

              <div class="mb-3 text-start">
                <label class="form-label small">Comms Email</label>
                <input type="email" id="email" class="form-control bg-dark text-white border-secondary"
                       placeholder="name@example.com" required>
              </div>

              <div class="mb-3 text-start">
                <label class="form-label small">Access Code</label>
                <input type="password" id="password" class="form-control bg-dark text-white border-secondary"
                       placeholder="Create a password" required>
              </div>

              <div class="mb-4 text-start">
                <label class="form-label small">Confirm Access Code</label>
                <input type="password" id="confirmPassword" class="form-control bg-dark text-white border-secondary"
                       placeholder="Confirm password" required>
              </div>

              <button type="submit" class="btn btn-primary w-100 py-2">Join the Fleet</button>
              <p id="registerMsg" class="small mt-3 mb-0 opacity-75"></p>
            </form>

            <p class="mt-4 small">
              Already enlisted?
              <a href="login.html" class="text-info text-decoration-none">Login here</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="py-3 text-center border-top border-secondary">
    <p class="m-0 small opacity-50">&copy; 2026 Cosmic Explorers</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script src="js/getCurrentURL.js"></script>
  <script src="js/queryCmds.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/userNavbarToggle.js"></script>

  <script src="js/registerUser.js"></script>
  <script src="js/theme.js"></script>
</body>
</html>

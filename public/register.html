<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Explorers - Join the Fleet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="https://cdn-icons-png.flaticon.com/512/3212/3212581.png" alt="Logo" width="30" height="30" class="me-2">
                Cosmic Explorers
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="challenges.html">Challenges</a></li>
                    <li class="nav-item"><a class="nav-link" href="planets.html">Planets</a></li>
                    <li class="nav-item"><a class="nav-link" href="leaderboard.html">Leaderboard</a></li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link active" href="register.html">Register</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1 d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card shadow-lg p-4">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold">Enlistment</h2>
                            <p class="text-muted">Create your universal profile.</p>
                        </div>
                        <form id="registerForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small">Callsign</label>
                                    <input type="text" id="username" class="form-control bg-dark text-white border-secondary" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small">Email</label>
                                    <input type="email" id="email" class="form-control bg-dark text-white border-secondary" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small">Security Key</label>
                                <input type="password" id="password" class="form-control bg-dark text-white border-secondary" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mt-2">Begin Journey</button>
                        </form>
                        <p class="text-center mt-4 small mb-0">Already registered? <a href="login.html" class="text-info text-decoration-none">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-3 text-center border-top border-secondary">
        <p class="m-0 small opacity-50">&copy; 2026 Cosmic Explorers</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/getCurrentURL.js"></script>
    <script src="js/registerUser.js"></script>
</body>
</html>
